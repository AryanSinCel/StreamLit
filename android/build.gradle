buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

/**
 * Async Storage v3 resolves `org.asyncstorage.shared_storage:storage-android` from a **local** Maven
 * repo inside the package (not Maven Central). Without this, `:app:compileDebugJavaWithJavac` fails.
 * @see https://github.com/react-native-async-storage/async-storage/issues/1280
 */
allprojects {
    repositories {
        maven {
            url("${rootDir}/../node_modules/@react-native-async-storage/async-storage/android/local_repo")
        }
    }
}
